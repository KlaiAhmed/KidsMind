services:
  # Database Service
  db:
    image: postgres:18.2-alpine
    container_name: postgres-db-container
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Core Service
  api-core:
    build:
      context: ./services/api
    image: api-core
    container_name: api-core-container
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
      stt-service:
        condition: service_started
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
      - ./services/api/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/api/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**' 
      --reload-exclude '**/__pycache__/**'

  # AI Service 
  ai-service:
    build:
      context: ./services/ai
    image: ai-service
    container_name: ai-service-container
    ports:
      - "${AI_PORT}:8000"
    env_file:
      - .env
      - ./services/ai/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/ai/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**'

  # STT Service 
  stt-service:
    build:
      context: ./services/stt
    image: stt-service
    container_name: stt-service-container
    ports:
      - "${STT_PORT}:8000"
    env_file:
      - .env
      - ./services/stt/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/model_cache
      - TORCH_HOME=/app/model_cache
      - XDG_CACHE_HOME=/app/model_cache
      - CTRANSLATE2_CACHE=/app/model_cache
    volumes:
      - ./services/stt/app:/app:rw
      - stt_cache:/app/model_cache
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude /app/model_cache 
      --reload-exclude '**/.git/**'

  # MinIO Service 
  minio:
    image: minio/minio:latest
    container_name: minio-storage-container
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  stt_cache:
  minio_data: