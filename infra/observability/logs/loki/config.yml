auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Chunks stored in MinIO, only index lives on local disk
storage_config:
  aws:
    endpoint: http://file-storage:9000
    access_key_id: ${STORAGE_ROOT_USER}
    secret_access_key: ${STORAGE_ROOT_PASSWORD}
    bucketnames: loki-chunks
    s3forcepathstyle: true
    insecure: true
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h