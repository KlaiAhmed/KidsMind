global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'fastapi-services'
    static_configs:
      - targets:
          - 'api-core:8000'
          - 'stt-service:8000'
          - 'ai-service:8000'
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - 'storage-service:9000'
